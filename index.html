<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EZLLM - 知识分享</title>
    <!-- 引入谷歌优质字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- 引入图标库 -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #f0f2f5;
        --surface-color: rgba(255, 255, 255, 0.75);
        --border-color: rgba(255, 255, 255, 0.5);
        --text-main: #1d1d1f;
        --text-secondary: #86868b;
        --accent: #4a6ee0;
        --accent-hover: #3b5cbd;
        --sidebar-width: 320px;
        --shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
        --glass-blur: blur(24px);
        --grad-bg: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #000000;
          --surface-color: rgba(28, 28, 30, 0.65);
          --border-color: rgba(255, 255, 255, 0.08);
          --text-main: #f5f5f7;
          --text-secondary: #a1a1a6;
          --accent: #5e81f4;
          --accent-hover: #7b98f6;
          --shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
          --grad-bg: linear-gradient(120deg, #1f1c2c 0%, #928dab 100%);
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Inter",
          "Noto Sans SC",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: var(--bg-color);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
        transition: all 0.4s ease;
      }

      /* 动态渐变背景 */
      .bg-mesh {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--grad-bg);
        z-index: -1;
        opacity: 0.15;
        animation: moveGradient 15s ease infinite alternate;
        background-size: 200% 200%;
      }

      @keyframes moveGradient {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 100% 50%;
        }
      }

      /* 侧边栏设计 */
      .sidebar {
        width: var(--sidebar-width);
        background: var(--surface-color);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        z-index: 10;
      }

      .brand {
        padding: 40px 30px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand i {
        font-size: 28px;
        color: var(--accent);
      }

      .brand span {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, var(--accent), #9b51e0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .nav-header {
        padding: 0 30px 10px;
        font-size: 13px;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 1px;
        color: var(--text-secondary);
      }

      .nav-list {
        list-style: none;
        overflow-y: auto;
        flex-grow: 1;
        padding: 0 20px 30px;
      }

      .nav-item {
        padding: 14px 18px;
        margin-bottom: 6px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 12px;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        position: relative;
        z-index: 1;
      }

      .nav-item i {
        font-size: 18px;
        color: var(--text-secondary);
        transition: all 0.3s ease;
      }

      .nav-item::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: 12px;
        background: var(--accent);
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: -1;
      }

      .nav-item:hover {
        color: var(--text-main);
        background: rgba(120, 120, 120, 0.08);
        transform: translateX(4px);
      }

      .nav-item:hover i {
        color: var(--accent);
      }

      .nav-item.active {
        color: #fff;
        transform: translateX(6px);
        box-shadow: 0 8px 24px rgba(74, 110, 224, 0.3);
      }

      .nav-item.active i {
        color: #fff;
      }

      .nav-item.active::before {
        opacity: 1;
      }

      /* 主阅读区设计 */
      .main-content {
        flex-grow: 1;
        padding: 60px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        scroll-behavior: smooth;
        position: relative;
      }

      .content-card {
        width: 100%;
        max-width: 840px;
        background: var(--surface-color);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--border-color);
        border-radius: 28px;
        padding: 60px 70px;
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(30px);
        animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .doc-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 20px;
        letter-spacing: 0.5px;
      }

      .doc-meta span {
        background: rgba(74, 110, 224, 0.1);
        padding: 4px 12px;
        border-radius: 20px;
      }

      .title {
        font-size: 38px;
        font-weight: 700;
        margin-bottom: 40px;
        line-height: 1.35;
        color: var(--text-main);
        letter-spacing: -0.5px;
      }

      .text-body {
        font-size: 17px;
        line-height: 2;
        color: var(--text-main);
        opacity: 0.88;
        white-space: pre-wrap; /* 保持纯文本的换行 */
        letter-spacing: 0.3px;
        text-align: justify;
      }

      /* 滚动条美化 */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(150, 150, 150, 0.2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(150, 150, 150, 0.4);
      }

      /* 响应式 */
      @media (max-width: 850px) {
        body {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          height: auto;
          max-height: 250px;
          border-right: none;
          border-bottom: 1px solid var(--border-color);
        }
        .main-content {
          padding: 30px 20px;
        }
        .content-card {
          padding: 40px 30px;
          border-radius: 20px;
        }
        .title {
          font-size: 28px;
        }
        .text-body {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-mesh"></div>

    <aside class="sidebar">
      <div class="brand">
        <i class="ri-lightbulb-flash-line"></i>
        <span>EZLLM 分享</span>
      </div>
      <div class="nav-header">知识文档</div>
      <ul class="nav-list" id="navList">
        <!-- 导航项将由JS动态生成 -->
      </ul>
    </aside>

    <main class="main-content" id="mainScroll">
      <div class="content-card" id="contentCard">
        <div class="doc-meta"><span id="docTag">介绍</span></div>
        <h1 class="title" id="contentTitle">欢迎使用 EZLLM</h1>
        <div class="text-body" id="textContent">
          请从左侧选择一个文档进行沉浸式阅读。
        </div>
      </div>
    </main>

    <script>
      // 你的原始文本数据在这里（目前目录下所有的 .txt 文件内容）
      const documents = [
        {
          title: "1.什么是大语言模型",
          content: `什么是大语言模型？\n首先，我们来搞清楚主角的名字：\n大语言模型，英文叫 Large Language Model，简称 LLM。\n不管是你每天用的通义千问、豆包、文心一言，还是 ChatGPT、Gemini，它们皮囊不同，但灵魂都是 LLM。\n那有人会问：什么是语言模型？\n之所以叫“模型”，是因为它在做一件数学上的事：对人类语言的规律进行数学建模。\n这就好比物理公式模拟抛物线，语言模型是在模拟说话的概率。\n为什么非要加个“大”字？\n其实很简单：只要它够大，就是大语言模型。\n这个“大”指的是参数量，英文叫 Parameters。它们通常包含数十亿甚至数万亿个参数。\n你可以把它想象成大脑里天文数字般的神经连接——正是这种暴力美学的规模，才涌现出了智能。\n它的工作本质上只有一件事——预测下一个字，也就是 Next Token Prediction。\n举个例子：当你输入“我爱”，模型经过疯狂计算，发现后面接“你”的概率是 99%，接“吃”的概率是 0.1%。于是它自信地输出了——“你”。\n说人话就是：LLM 是专门解决自然语言问题的专家。\n在最基础的定义里，它只懂文字。它本质上看不懂图片，也听不懂视频，它处理的是纯粹的文本信息流。\n这时候，小伙伴们肯定想到了：既然有处理文字的语言模型，那是不是也有处理图片的视觉模型？没错！甚至还有把它们合体的多模态模型。`,
        },
        {
          title: "2.什么是视觉模型与多模态",
          content: `什么是视觉模型与多模态？\n什么是视觉模型？\n简单来说，它是像素世界的“翻译官”。在计算机眼中，图片并非色彩斑斓的风景，而是一堆冰冷的数字矩阵。视觉模型的任务，就是从这些杂乱的数字中抽丝剥茧。无论是经典的 CNN（卷积神经网络），还是如今大火的 Transformer，其核心逻辑都是通过多层网络过滤，从基础的线条、边缘，进化到识别复杂的形状与物体。最终，它会笃定地告诉你：“嘿，这堆数字代表的是一只猫。”\n提到多模态，我们绕不开深度学习领域的两座大山：CV（计算机视觉）与 NLP（自然语言处理）。如果说语言模型是负责“听话”与“对话”的智囊，致力于解决文本理解的难题，那么 CV 要解决的，就是让 AI 真正“看见”这个世界。它的终极目标很简单：让计算机像人类一样，读懂每一张图像、每一段视频。\n随着算力时代的爆炸式增长，模型规模也在疯狂扩张。既然有处理文本的 LLM（大语言模型），自然也催生了处理图像与文本的 VLM（Vision-Language Models，视觉语言模型），也就是我们常说的多模态模型。过去的 AI，看图的只管看图，说话的只管说话，是各司其职的“偏科生”；而多模态 AI，彻底打通了视觉与语言的“任督二脉”，实现了跨维度的信息互通。\n它到底强在哪？\n它不再是孤立地处理像素，而是深刻理解了“画面”与“文字”之间的内在逻辑。它能由图生文：丢给它一张风景照，它能瞬间为你生成充满氛围感的朋友圈文案；它能视觉问答：你问它“图中穿红衣服的人在干什么？”，它能精准捕捉细节并给出答案；它甚至能文生图：你只需给出一句指令，它便能凭空构想出一幅画作。\n说白了：视觉模型给了 AI 眼睛，语言模型给了 AI 嘴巴。而多模态模型，则让 AI 进化成了一个“有眼有嘴、能看能说”的完整体。它不仅能洞察物理世界，还能将其中的逻辑转化成人类听得懂的语言。既然 AI 已经具备了观察与表达的能力，那我们该如何精准地指挥它干活呢？这就引出了 AI 时代的“通用编程语言”——提示词（Prompt）。`,
        },
        {
          title: "3.什么是prompt",
          content: `什么是 Prompt？\n\n在拥有了超级大脑（LLM）和视觉感知能力之后，AI 并不能自动知晓你的具体意图，它需要一个明确的指令来激活。这个指令，就叫 Prompt，中文通常翻译为“提示词”。它是你输入给模型的一段文字，也是你和 AI 交流的核心桥梁。简单来说，Prompt 就是你对 AI 发出的具体任务指令。\n\n为什么叫 Prompt？\n这个词在英语里有“提示、驱使”的含义。\n我们可以把 AI 想象成一位博学但需要引导的演员，而你则是导演或提词员。\n如果你不给它明确的提示（Prompt），它可能无法开始工作，或者生成的内容偏离预期。\n你的任务，就是提供清晰的线索，引导它基于这些线索，通过概率计算，一步步生成符合你要求的内容。\n\nPrompt 的质量，直接决定了 AI 的输出效果。\n这在计算机领域遵循一个基本原则：Garbage In, Garbage Out（垃圾进，垃圾出）。\n大语言模型本质上是一个概率预测工具。Prompt 的作用，就是“限定”这个概率预测的范围和方向。\n你给的约束越具体，它生成的内容就越精准；你给的指令越模糊，结果就越容易不可控。\n\n我们来看个对比。\n❌ 模糊的 Prompt：\n你输入：“写个故事。”\nAI 面临的困惑：“写什么主题？给谁看？多长篇幅？什么风格？”\n结果：它可能生成一篇内容平淡、缺乏重点的流水账。\n\n✅ 清晰的 Prompt：\n你输入：“你是一位科幻作家。请用简洁有力的风格，写一个关于‘只会说谎的机器人’的 300 字微小说，要求结局有反转。”\nAI 接收到的信息：“明确了角色设定、写作风格、题材、字数限制以及结局要求。”\n结果：它生成了一篇结构完整、风格鲜明的短篇小说。\n\n通俗来说：\nPrompt 是 AI 时代的一种新式“编程语言”。\n过去我们用 Python、C++ 等代码指挥电脑；现在，我们用自然语言指挥 AI。\nPrompt 就是你调动 AI 能力的“钥匙”。指令清晰准确，AI 就能发挥巨大价值；指令模糊不清，AI 的表现就会大打折扣。`,
        },
      ];

      const navList = document.getElementById("navList");
      const contentTitle = document.getElementById("contentTitle");
      const textContent = document.getElementById("textContent");
      const contentCard = document.getElementById("contentCard");
      const mainScroll = document.getElementById("mainScroll");

      function loadDocument(index) {
        const doc = documents[index];
        if (!doc) return;

        // 平滑重置动画
        contentCard.style.animation = "none";
        contentCard.offsetHeight; // 触发回流重绘
        contentCard.style.animation =
          "fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards";

        contentTitle.textContent = doc.title.replace(/^\d+\./, ""); // 移除数字前缀
        textContent.textContent = doc.content;

        mainScroll.scrollTo({ top: 0, behavior: "smooth" });

        // 更新导航高亮状态
        const navItems = document.querySelectorAll(".nav-item");
        navItems.forEach((item, i) => {
          if (i === index) {
            item.classList.add("active");
          } else {
            item.classList.remove("active");
          }
        });
      }

      function init() {
        if (documents.length === 0) return;

        documents.forEach((doc, index) => {
          const li = document.createElement("li");
          li.className = "nav-item";

          // 添加图标
          const icon = document.createElement("i");
          icon.className = "ri-article-line";
          li.appendChild(icon);

          // 添加文本
          const span = document.createElement("span");
          span.textContent = doc.title;
          li.appendChild(span);

          li.onclick = () => loadDocument(index);
          navList.appendChild(li);
        });

        // 初始加载第一篇文章
        setTimeout(() => {
          loadDocument(0);
        }, 100);
      }

      // 初始化运行
      init();
    </script>
  </body>
</html>
